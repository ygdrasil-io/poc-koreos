name: update-roadmap-dashboard

# Régénère docs/koreos/roadmap-progress.md depuis Redmine + git log (Redmine #87).
# Tourne chaque jour à 9h UTC et sur push master. Commit auto si le contenu change.
# Requiert les secrets REDMINE_URL et REDMINE_API_KEY.

on:
  schedule:
    - cron: '0 9 * * *'
  push:
    branches: [master]
    paths:
      - 'scripts/generate-roadmap-progress.py'
      - '.github/workflows/roadmap-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-roadmap-dashboard:
    runs-on: ubuntu-latest
    # Sans secret Redmine configuré, le job se termine proprement sans rien faire.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git log complet pour le mapping PRs ↔ tickets

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install deps
        run: pip install requests

      - name: Generate dashboard
        env:
          REDMINE_URL: ${{ secrets.REDMINE_URL }}
          REDMINE_API_KEY: ${{ secrets.REDMINE_API_KEY }}
        run: |
          if [ -z "$REDMINE_URL" ] || [ -z "$REDMINE_API_KEY" ]; then
            echo "Secrets Redmine absents — skip."
            exit 0
          fi
          python scripts/generate-roadmap-progress.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain docs/koreos/roadmap-progress.md)" ]; then
            git config user.name "koreos-bot"
            git config user.email "bot@ygdrasil.io"
            git add docs/koreos/roadmap-progress.md
            git commit -m "chore(dashboard): update roadmap-progress"
            git push
          else
            echo "Aucun changement."
          fi
