name: Deploy docs (MkDocs Material → GitHub Pages)

# Déclenché sur push master quand les sources docs changent,
# ou manuellement via workflow_dispatch.
# La génération Dokka GFM est faite localement et committée dans docs/
# (voir buildSrc/.../kmp-dokka.gradle.kts + GRA-157).

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-static-i18n

      # Les fichiers GFM Dokka sont déjà committés dans docs/koreos/api/.
      # Aucune régénération Gradle nécessaire ici.
      - name: Build site (MkDocs)
        run: mkdocs build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
