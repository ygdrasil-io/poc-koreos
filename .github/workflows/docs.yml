name: Deploy docs (MkDocs Material → GitHub Pages)

# Déclenché sur push master quand les sources docs changent,
# ou manuellement via workflow_dispatch.
# La génération Dokka GFM est faite localement et committée dans docs/
# (voir buildSrc/.../kmp-dokka.gradle.kts + GRA-157).

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      # Redmine #20 : redéployer les démos web quand les samples ou la stack web changent.
      - 'samples/hello-window-web/**'
      - 'samples/hello-triangle-web/**'
      - 'koreos-js/**'
      - 'koreos-wasm/**'
      - 'koreos-web-common/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-awesome-pages-plugin mkdocs-static-i18n

      # Les fichiers GFM Dokka sont déjà committés dans docs/koreos/api/.
      # Aucune régénération Gradle nécessaire ici.
      - name: Build site (MkDocs)
        run: mkdocs build

      # ── Démos web live (Redmine #20) ──────────────────────────────────────
      # Build des samples web en production (variante JS) et copie sous _site/demos/
      # pour qu'ils soient servis sur le même site Pages que la doc, sans conflit
      # de concurrency group. La toolchain Node/webpack est activée par #91.
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build web samples (production JS bundles)
        run: |
          ./gradlew \
            :samples:hello-window-web:jsBrowserDistribution \
            :samples:hello-triangle-web:jsBrowserDistribution \
            --no-daemon --stacktrace

      - name: Assemble demos into _site/demos
        run: |
          mkdir -p _site/demos
          cp -r samples/hello-window-web/build/dist/js/productionExecutable   _site/demos/hello-window-web
          cp -r samples/hello-triangle-web/build/dist/js/productionExecutable _site/demos/hello-triangle-web
          cat > _site/demos/index.html <<'HTML'
          <!doctype html>
          <html lang="fr">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Koreos — démos web live</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
              h1 { font-size: 1.5rem; }
              li { margin: .5rem 0; }
            </style>
          </head>
          <body>
            <h1>Koreos — démos web live</h1>
            <p>Samples Koreos compilés en Kotlin/JS et exécutés dans le navigateur (WebGPU requis pour le triangle).</p>
            <ul>
              <li><a href="hello-window-web/">hello-window-web</a> — fenêtre canvas + journal d'événements DOM</li>
              <li><a href="hello-triangle-web/">hello-triangle-web</a> — triangle RGB via wgpu4k Web</li>
            </ul>
          </body>
          </html>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
