name: web-e2e

# Test E2E smoke Web (Redmine #22 + #88) : « au moins une frame présentée »
# + diff visuel sur hello-triangle-web. Build le bundle JS de production, le
# sert, puis lance **Chrome stable** sur macOS (Metal) et Windows (D3D12).
#
# Pourquoi pas Linux/SwiftShader ?
# - WebGPU encore expérimental sur Linux, rendu logiciel pouvant différer.
# - Chrome stable sur macOS/Windows = WebGPU stable depuis Chrome 113 +
#   GPU réel (Metal/D3D12) = reflète mieux l'usage des end-users.

on:
  push:
    branches: [master]
    paths:
      - 'samples/hello-triangle-web/**'
      - 'koreos-js/**'
      - 'koreos-web-common/**'
      - '.github/workflows/web-e2e.yml'
  pull_request:
    branches: [master]
    paths:
      - 'samples/hello-triangle-web/**'
      - 'koreos-js/**'
      - 'koreos-web-common/**'
      - '.github/workflows/web-e2e.yml'
  workflow_dispatch:

jobs:
  web-e2e:
    name: web-e2e (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Bash sur tous les runners (Git Bash sur Windows) pour homogénéiser
        # les commandes (./gradlew, redirections, [ -f ... ]).
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Grant execute permission for gradlew (Unix only)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build hello-triangle-web (production JS bundle)
        run: ./gradlew :samples:hello-triangle-web:jsBrowserDistribution --no-daemon --stacktrace

      - name: Install E2E deps
        working-directory: samples/hello-triangle-web/e2e
        run: npm install

      - name: Install Playwright Chrome channel
        working-directory: samples/hello-triangle-web/e2e
        # `npx playwright install chrome` télécharge le binaire Chrome stable
        # géré par Playwright (vs `chromium` qui est le build open-source sans
        # WebGPU activé par défaut). Pas de `--with-deps` (Linux-only).
        run: npx playwright install chrome

      - name: Run Playwright smoke + visual tests
        working-directory: samples/hello-triangle-web/e2e
        run: npx playwright test

      # Résumé visuel directement sur la page du run (Redmine #88).
      - name: Publier le résumé visuel
        if: always()
        run: |
          SUMMARY=samples/hello-triangle-web/e2e/test-results/visual-summary.md
          if [ -f "$SUMMARY" ]; then
            cat "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Captures (smoke + régression visuelle) — séparées par OS pour pouvoir
      # comparer macOS Metal vs Windows D3D12.
      - name: Upload captures (screenshots + diff)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-triangle-web-captures-${{ matrix.os }}
          path: |
            samples/hello-triangle-web/e2e/triangle.png
            samples/hello-triangle-web/e2e/baselines/hello-triangle-web.png
            samples/hello-triangle-web/e2e/test-results/hello-triangle-web.actual.png
            samples/hello-triangle-web/e2e/test-results/hello-triangle-web.diff.png
          if-no-files-found: ignore
