name: windows-visual

# Régression visuelle Windows via readback GPU (Redmine #88).
# hello-triangle rend une frame offscreen (fenêtre Win32 cachée → surface → texture
# offscreen), écrit un PNG par readback wgpu, comparé à une baseline committée.
# NON BLOQUANT (rendu GPU non déterministe / dispo GPU runner incertaine).

on:
  push:
    branches: [master]
    paths:
      - 'samples/hello-triangle/**'
      - 'tests/visual/**'
      - '.github/workflows/windows-visual.yml'
  pull_request:
    branches: [master]
    paths:
      - 'samples/hello-triangle/**'
      - 'tests/visual/**'
      - '.github/workflows/windows-visual.yml'
  workflow_dispatch:

jobs:
  windows-visual:
    name: windows-visual
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Capture GPU offscreen (hello-triangle)
        id: capture
        continue-on-error: true
        run: |
          mkdir -p build/visual
          ./gradlew :samples:hello-triangle:run \
            --args="--capture build/visual/hello-triangle.actual.png" \
            --no-daemon --stacktrace

      - name: Diff visuel vs baseline (non bloquant)
        if: always()
        run: |
          cd tests/visual && npm install && cd -
          node tests/visual/diff-cli.js \
            build/visual/hello-triangle.actual.png \
            tests/visual/baselines/windows/hello-triangle.png \
            build/visual/hello-triangle.diff.png \
            0.02 \
            build/visual/summary.md || true
          if [ -f build/visual/summary.md ]; then
            cat build/visual/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-triangle-windows-visual
          path: |
            build/visual/hello-triangle.actual.png
            build/visual/hello-triangle.diff.png
            tests/visual/baselines/windows/hello-triangle.png
          if-no-files-found: ignore
