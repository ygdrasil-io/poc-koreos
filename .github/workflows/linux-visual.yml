name: linux-visual

# Régression visuelle Linux via readback GPU (Redmine #88).
# La capture réutilise l'EventLoop koreos pour obtenir une fenêtre Wayland, d'où la
# surface wgpu, puis rend offscreen + readback. NON BLOQUANT.
#
# Headless : compositor Wayland Weston (backend headless) + Vulkan logiciel (Mesa
# lavapipe), les runners n'ayant pas de GPU.

on:
  push:
    branches: [master]
    paths:
      - 'samples/hello-triangle/**'
      - 'tests/visual/**'
      - '.github/workflows/linux-visual.yml'
  pull_request:
    branches: [master]
    paths:
      - 'samples/hello-triangle/**'
      - 'tests/visual/**'
      - '.github/workflows/linux-visual.yml'
  workflow_dispatch:

jobs:
  linux-visual:
    name: linux-visual
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Wayland compositor + software Vulkan
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            weston \
            libwayland-dev wayland-protocols libxkbcommon-dev \
            mesa-vulkan-drivers vulkan-tools

      - name: Start headless Weston
        run: |
          weston --version || true
          export XDG_RUNTIME_DIR=/tmp/wl-runtime
          mkdir -p "$XDG_RUNTIME_DIR" && chmod 700 "$XDG_RUNTIME_DIR"
          # weston 13 (Ubuntu 24.04) : module headless-backend.so + renderer Pixman
          # (logiciel — pas d'EGL/GPU requis pour le compositor lui-même).
          weston \
            --backend=headless-backend.so \
            --renderer=pixman \
            --width=800 --height=600 \
            --socket=wayland-ci \
            --idle-time=0 \
            --log=/tmp/weston.log \
            > /tmp/weston.stdout 2>&1 &
          for i in $(seq 1 60); do
            [ -S "$XDG_RUNTIME_DIR/wayland-ci" ] && break
            sleep 0.5
          done
          echo "----- weston.log -----";    cat /tmp/weston.log    2>/dev/null || true
          echo "----- weston.stdout -----"; cat /tmp/weston.stdout 2>/dev/null || true
          if [ -S "$XDG_RUNTIME_DIR/wayland-ci" ]; then
            echo "✅ socket Wayland présent"
            echo "WAYLAND_DISPLAY=wayland-ci" >> "$GITHUB_ENV"
          else
            echo "::warning::socket Wayland absent — capture sautée"
          fi
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Diagnostic : capacités WSI du Vulkan logiciel (lavapipe) sur ce runner.
      - name: Vulkan/WSI diagnostic
        continue-on-error: true
        env:
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          echo "----- vulkaninfo --summary -----"
          vulkaninfo --summary 2>&1 | grep -iE "deviceName|driverName|apiVersion|GPU id" | head
          echo "----- extensions surface/wayland -----"
          vulkaninfo 2>&1 | grep -iE "VK_KHR_surface|VK_KHR_wayland_surface|VK_KHR_xcb_surface|VK_KHR_swapchain" | sort -u | head

      - name: Capture GPU offscreen (hello-triangle)
        id: capture
        continue-on-error: true
        env:
          # Force Vulkan logiciel (lavapipe) — pas de GPU sur les runners.
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
        run: |
          # Ne lance la capture que si un compositor Wayland est disponible
          # (évite un abort natif de la pile Wayland sans display).
          if [ -z "$WAYLAND_DISPLAY" ] || [ ! -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" ]; then
            echo "::warning::pas de compositor Wayland — capture Linux sautée"
            exit 0
          fi
          ./gradlew :samples:hello-triangle:run \
            --args="--capture build/visual/hello-triangle.actual.png" \
            --no-daemon --stacktrace

      # Diagnostic : si la JVM a crashé (FFM natif), remonter le hs_err (frames Java
      # appelantes + frames natives) directement dans le log CI.
      - name: Dump crash report (hs_err)
        if: always()
        run: |
          f=$(ls -t samples/hello-triangle/hs_err_pid*.log 2>/dev/null | head -1)
          if [ -n "$f" ]; then
            echo "===== $f (extrait) ====="
            sed -n '1,40p' "$f"
            echo "----- Native frames / Java frames -----"
            awk '/Native frames|Java frames|Stack:/{f=1} f{print} /^$/{if(f)n++} n>3{exit}' "$f" | head -60
          else
            echo "Aucun hs_err trouvé."
          fi

      - name: Diff visuel vs baseline (non bloquant)
        if: always()
        run: |
          cd tests/visual && npm install && cd -
          DIR=samples/hello-triangle/build/visual
          node tests/visual/diff-cli.js \
            "$DIR/hello-triangle.actual.png" \
            tests/visual/baselines/linux/hello-triangle.png \
            "$DIR/hello-triangle.diff.png" \
            0.02 \
            "$DIR/summary.md" \
            Linux || true
          if [ -f "$DIR/summary.md" ]; then
            cat "$DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload captures
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-triangle-linux-visual
          path: |
            samples/hello-triangle/build/visual/hello-triangle.actual.png
            samples/hello-triangle/build/visual/hello-triangle.diff.png
            tests/visual/baselines/linux/hello-triangle.png
          if-no-files-found: ignore
