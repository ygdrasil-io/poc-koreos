# ─────────────────────────────────────────────────────────────────────────────
# Koreos CI — Multi-Platform
#
# Stratégie à deux niveaux (GRA-160 + GRA-39) :
#
#   ┌─ Fast-Track (toutes les branches)  ────────────────────────────────────┐
#   │  build-and-test  JVM uniquement (macos-latest) — feedback < 10 min    │
#   │  macos-build     AppKit + samples macOS — feedback < 5 min            │
#   └─────────────────────────────────────────────────────────────────────────┘
#
#   ┌─ Deep-Testing (PR → master, push master, ou branches claude/**) ───────┐
#   │  build-and-test      JVM + allTests (macos-15, iOS simulator)          │
#   │  ios-build           iOS simulator arm64 — build + link + tests        │
#   │  android-build       Android (ubuntu-latest) — build + assembleDebug   │
#   │  windows-build       Win32 FFM (windows-latest) — build + jvmTest      │
#   │  linux-x11-build     X11/Xvfb (ubuntu-latest) — jvmTest + build       │
#   │  linux-wayland-build Wayland (ubuntu-latest) — jvmTest + build        │
#   └─────────────────────────────────────────────────────────────────────────┘
#
#   Note : ios-build et android-build sont des jobs coûteux (runners macOS /
#   Ubuntu + compilation native). Ils se déclenchent sur :
#     • push / PR vers master (Deep-Testing historique)
#     • push / PR sur les branches claude/** (feature branches CI)
#   Sur les autres branches, seul le Fast-Track JVM tourne (<10 s).
#
# ─────────────────────────────────────────────────────────────────────────────

name: Koreos CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # ── Job 1 : build-and-test ────────────────────────────────────────────────
  #
  # Fast-Track   : JVM uniquement (branches non-master)
  # Deep-Testing : allTests incluant iOS simulator (PR vers master / master)
  #
  # Utilise macos-15 car ce runner inclut le simulateur iOS requis pour les
  # tests Kotlin/Native iosSimulatorArm64 en mode Deep.
  build-and-test:
    name: build-and-test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Détection du mode de test
      - name: Determine test strategy
        id: strategy
        run: |
          if [[ "${{ github.base_ref }}" == "master" || "${{ github.ref }}" == "refs/heads/master" ]]; then
            echo "mode=deep" >> $GITHUB_OUTPUT
            echo "→ Deep-Testing (all targets) — PR to master or master branch"
          else
            echo "mode=fast-track" >> $GITHUB_OUTPUT
            echo "→ Fast-Track JVM only"
          fi

      # Fast-Track : tests JVM uniquement (~3 min cache chaud)
      - name: Fast-Track JVM tests
        if: steps.strategy.outputs.mode == 'fast-track'
        run: |
          ./gradlew \
            :koreos-core:jvmTest \
            :koreos-appkit:jvmTest \
            --no-daemon \
            --stacktrace

      # Deep-Testing : allTests (JVM + iOS simulator arm64)
      # Le simulateur iOS est disponible sur macos-15 via Xcode.
      - name: Deep-Testing (JVM + iOS simulator)
        if: steps.strategy.outputs.mode == 'deep'
        run: |
          ./gradlew \
            :koreos-core:jvmTest \
            :koreos-core:iosSimulatorArm64Test \
            :koreos-appkit:jvmTest \
            :koreos:jvmTest \
            :koreos:iosSimulatorArm64Test \
            --no-daemon \
            --stacktrace

  # ── Job 2 : macos-build ──────────────────────────────────────────────────
  #
  # Compile les modules macOS-spécifiques (AppKit FFM) et les samples JVM/macOS.
  # Valide que koreos-appkit + samples compilent sur un runner macOS standard.
  # S'exécute sur toutes les branches pour un feedback rapide.
  macos-build:
    name: macos-build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compile les modules macOS-only + samples JVM
      # hello-triangle nécessite wgpu4k — compilé mais non exécuté en CI.
      - name: Build macOS modules + JVM samples
        run: |
          ./gradlew \
            :koreos-core:jvmTest \
            :koreos-appkit:build \
            :koreos:jvmTest \
            :samples:hello-metal:build \
            :samples:hello-triangle:build \
            :samples:hello-window:compileKotlinJvm \
            --no-daemon \
            --stacktrace

  # ── Job 3 : ios-build ────────────────────────────────────────────────────
  #
  # Build les cibles iOS (iosSimulatorArm64, iosArm64, iosX64) et exécute
  # les tests Kotlin/Native sur simulateur iosSimulatorArm64.
  #
  # S'exécute sur Deep-Testing :
  #   • PRs vers master / push sur master
  #   • push ou PR sur les branches claude/** (feature branches CI)
  # Évite de consommer les runners macOS coûteux sur toutes les autres branches.
  ios-build:
    name: ios-build
    runs-on: macos-15
    if: |
      github.base_ref == 'master' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/heads/claude/') ||
      startsWith(github.head_ref, 'claude/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Compile tous les modules pour la cible iOS simulator arm64.
      # Les tests Kotlin/Native s'exécutent via le simulateur Xcode intégré.
      - name: Build iOS targets (iosSimulatorArm64)
        run: |
          ./gradlew \
            :koreos-core:compileKotlinIosSimulatorArm64 \
            :koreos-uikit:compileKotlinIosSimulatorArm64 \
            :koreos:compileKotlinIosSimulatorArm64 \
            :samples:hello-touch:compileKotlinIosSimulatorArm64 \
            :samples:hello-window:compileKotlinIosSimulatorArm64 \
            --no-daemon \
            --stacktrace

      # Run Kotlin/Native tests on iOS simulator (iosSimulatorArm64)
      - name: Run iOS simulator tests
        run: |
          ./gradlew \
            :koreos-core:iosSimulatorArm64Test \
            :koreos:iosSimulatorArm64Test \
            --no-daemon \
            --stacktrace

  # ── Job 4 : android-build ────────────────────────────────────────────────
  #
  # Build les modules Android et les samples Android (assembleDebug).
  # Utilise ubuntu-latest (Android SDK pré-installé sur les runners GitHub).
  #
  # S'exécute sur Deep-Testing :
  #   • PRs vers master / push sur master
  #   • push ou PR sur les branches claude/** (feature branches CI)
  #
  # Tests instrumentés : les modules Koreos n'ont pas encore de tests
  # Robolectric — le job valide la compilation et le packaging APK.
  # À étendre avec Robolectric quand des tests Android seront ajoutés.
  android-build:
    name: android-build
    runs-on: ubuntu-latest
    if: |
      github.base_ref == 'master' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/heads/claude/') ||
      startsWith(github.head_ref, 'claude/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Android SDK est pré-installé sur ubuntu-latest.
      # JDK 17 est requis par le plugin Android Gradle (AGP 8.x+).
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Configure le chemin du SDK Android depuis la variable d'environnement
      # ANDROID_HOME fournie par le runner ubuntu-latest.
      - name: Set up Android SDK path
        run: echo "sdk.dir=$ANDROID_HOME" >> local.properties

      # Build les modules Android + samples Android (APK debug).
      # AGP génère des APKs compilés pour API 24+ (minSdk=24 sur tous les modules).
      - name: Build Android modules + samples
        run: |
          ./gradlew \
            :koreos-android:build \
            :koreos:compileDebugKotlinAndroid \
            :samples:hello-touch-android:assembleDebug \
            :samples:hello-window-android:assembleDebug \
            --no-daemon \
            --stacktrace

  # ── Job 5 : windows-build ────────────────────────────────────────────────
  #
  # Build les modules Win32 (koreos-win32 FFM) et exécute les tests JVM Windows.
  # Valide la compilation Win32-specific et le sample hello-triangle sur Windows.
  #
  # S'exécute sur Deep-Testing :
  #   • PRs vers master / push sur master
  #   • push ou PR sur les branches claude/** (feature branches CI)
  #
  # Utilise shell: bash (Git Bash, disponible sur windows-latest) pour
  # exécuter ./gradlew de manière compatible avec les autres jobs.
  windows-build:
    name: windows-build
    runs-on: windows-latest
    if: |
      github.base_ref == 'master' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/heads/claude/') ||
      startsWith(github.head_ref, 'claude/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      # Build les modules Win32 + JVM core tests + sample hello-triangle.
      # Git Bash (shell: bash) permet d'utiliser ./gradlew directement sur Windows.
      - name: Build Win32 modules + JVM tests
        shell: bash
        run: |
          ./gradlew \
            :koreos-core:jvmTest \
            :koreos-win32:build \
            :koreos-win32:jvmTest \
            :samples:hello-triangle:build \
            --no-daemon \
            --stacktrace

  # ── Job 6 : linux-x11-build ─────────────────────────────────────────────
  #
  # Build le module koreos-x11 et exécute les tests JVM sous Xvfb (X11 virtuel).
  # Utilise ubuntu-latest avec les paquets X11 dev pour fournir libX11 au runtime.
  #
  # S'exécute sur Deep-Testing :
  #   • PRs vers master / push sur master
  #   • push ou PR sur les branches claude/** (feature branches CI)
  #
  # Note : koreos-x11:jvmTest détecte automatiquement l'absence de display et
  # saute les tests nécessitant un serveur X — xvfb-run -a fournit un display
  # virtuel stable pour les tests qui en ont besoin.
  # hello-triangle (wgpu native) est exclu pour v0.2.
  linux-x11-build:
    name: linux-x11-build
    runs-on: ubuntu-latest
    if: |
      github.base_ref == 'master' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/heads/claude/') ||
      startsWith(github.head_ref, 'claude/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      # Installe les dépendances X11 requises par koreos-x11 (FFM + JNI).
      # libX11-dev fournit le .so runtime ; xvfb fournit un serveur X virtuel.
      - name: Install X11 dependencies
        run: sudo apt-get install -y xvfb libx11-dev libxi-dev libxkbcommon-dev

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # xvfb-run -a démarre un display X virtuel pour les tests qui en ont besoin.
      # Les tests sans display (compile-only) s'exécutent normalement.
      - name: Build X11 modules + JVM tests (Xvfb)
        run: |
          xvfb-run -a ./gradlew \
            :koreos-core:jvmTest \
            :koreos-x11:build \
            --no-daemon \
            --stacktrace

  # ── Job 7 : linux-wayland-build ─────────────────────────────────────────
  #
  # Build le module koreos-wayland et exécute les tests JVM Wayland.
  # Utilise ubuntu-latest avec les paquets Wayland dev.
  #
  # S'exécute sur Deep-Testing :
  #   • PRs vers master / push sur master
  #   • push ou PR sur les branches claude/** (feature branches CI)
  #
  # Note : pas de serveur Wayland disponible en CI — wl_display_connect()
  # retourne null et les tests nécessitant un compositeur Wayland sont sautés
  # automatiquement. Le job valide la compilation et les tests indépendants
  # du compositeur.
  linux-wayland-build:
    name: linux-wayland-build
    runs-on: ubuntu-latest
    if: |
      github.base_ref == 'master' ||
      github.ref == 'refs/heads/master' ||
      startsWith(github.ref, 'refs/heads/claude/') ||
      startsWith(github.head_ref, 'claude/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      # Installe les dépendances Wayland requises par koreos-wayland (FFM + JNI).
      - name: Install Wayland dependencies
        run: sudo apt-get install -y libwayland-dev wayland-protocols libxkbcommon-dev

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Pas de display nécessaire : les tests compilent et s'exécutent sans
      # compositeur Wayland (wl_display_connect retourne null → tests sautés).
      - name: Build Wayland modules + JVM tests
        run: |
          ./gradlew \
            :koreos-core:jvmTest \
            :koreos-wayland:build \
            --no-daemon \
            --stacktrace
