site_name: Koreos
site_description: Cross-platform windowing & events for Kotlin Multiplatform
site_url: https://ygdrasil-io.github.io/poc-koreos/
repo_url: https://github.com/ygdrasil-io/poc-koreos
repo_name: ygdrasil-io/poc-koreos

docs_dir: docs
site_dir: _site

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages:
      collapse_single_pages: true
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
        - locale: fr
          name: Français
          site_name: Koreos
          site_description: Fenêtrage et événements multiplateforme pour Kotlin Multiplatform
